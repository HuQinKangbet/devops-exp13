name: CI-GHCR自动打包推送
on:
  push:
    branches: [ main ]
permissions:
  contents: read
  packages: write
env:
  REG: ghcr.io
  # 关键：| lower 把仓库地址全部转为小写，规避大写报错
  IMAGE: ${{ github.repository | lower }}

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    steps:
      - name: 检出源码
        uses: actions/checkout@v4

      - name: Python环境安装
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: 执行单元测试
        run: |
          pip install -r requirements.txt
          pytest test_app.py -v

      - name: 登录GHCR镜像仓库
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REG }}
          username: ${{ github.actor | lower }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建推送镜像
        run: |
          docker build -t ${{ env.REG }}/${{ env.IMAGE }}:latest .
          docker push ${{ env.REG }}/${{ env.IMAGE }}:latest
