name: CI-GHCR自动打包推送
on:
  push:
    branches: [ main ]
permissions:
  contents: read
  packages: write
env:
  REG: ghcr.io

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    steps:
      - name: 检出源码
        uses: actions/checkout@v4

      - name: Python环境安装
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: 执行单元测试
        run: |
          pip install -r requirements.txt
          pytest test_app.py -v

      # shell统一转小写，存入环境变量（核心解决大写问题）
      - name: 生成小写用户名&镜像名
        run: |
          echo "USER_LC=$(echo ${{ github.actor }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "REPO_LC=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: 登录GHCR镜像仓库
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REG }}
          username: ${{ env.USER_LC }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建推送镜像
        run: |
          docker build -t ${{ env.REG }}/${{ env.REPO_LC }}:latest .
          docker push ${{ env.REG }}/${{ env.REPO_LC }}:latest
